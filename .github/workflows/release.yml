name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run tauri build
      - name: Rename portable exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri/target/release/*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "Mewgenics-Savegame-Manager_${{ github.ref_name }}_portable.exe"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: Mewgenics-Savegame-Manager_*_portable.exe
          name: 'Mewgenics Savegame Manager ${{ github.ref_name }}'
          body: 'Portable Windows exe — no installation, just run it. Requires the WebView2 runtime (preinstalled on Windows 10/11).'
